name: Build and Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            qt_arch: win64_msvc2019_64
            qt_dir: msvc2019_64
          - os: ubuntu-22.04
            qt_arch: gcc_64
            qt_dir: gcc_64
    env:
      PYSIDE_VERSION: "6.6.2"
      PYTHONUTF8: "1" 

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libgl1-mesa-dev libxkbcommon-x11-dev libx11-xcb-dev libxext-dev libvulkan-dev libclang-dev clang llvm patchelf

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python environment
        run: uv venv && uv sync

      - name: Download Qt C++
        run: |
          uv run aqt install-qt ${{ runner.os == 'Windows' && 'windows' || 'linux' }} desktop ${{ env.PYSIDE_VERSION }} ${{ matrix.qt_arch }} --outputdir ${{ github.workspace }}/Qt

      - name: Setup MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build and Package Wheel
        env:
          QT_DIR: ${{ github.workspace }}/Qt/${{ env.PYSIDE_VERSION }}/${{ matrix.qt_dir }}
        run: |
          uv run python scripts/build.py

      - name: Fix Wheel for PyPI (Linux)
        if: runner.os == 'Linux'
        env:
          QT_DIR: ${{ github.workspace }}/Qt/${{ env.PYSIDE_VERSION }}/${{ matrix.qt_dir }}
        run: |
          export LD_LIBRARY_PATH=$QT_DIR/lib:$LD_LIBRARY_PATH
          uv run auditwheel show wheel/dist/*.whl | tee wheel/dist/auditwheel-show.txt
          EXCLUDE_LIBS=$(uv run python - <<'PY'
          import json
          import re
          from pathlib import Path
          
          show_output = Path("wheel/dist/auditwheel-show.txt").read_text(encoding="utf-8")
          blocks = re.findall(
              r"The following external shared libraries are required by the wheel:\n(\{.*?\})",
              show_output,
              re.S,
          )
          
          libs = set()
          for block in blocks:
              try:
                  data = json.loads(block)
              except json.JSONDecodeError:
                  continue
              for lib_name in data:
                  if (
                      lib_name.startswith("libQt6")
                      or lib_name.startswith("libpyside6.abi3.so")
                      or lib_name.startswith("libshiboken6.abi3.so")
                  ):
                      libs.add(lib_name)
          
          print("\n".join(sorted(libs)))
          PY
          )

          EXCLUDE_ARGS=()
          if [ -n "$EXCLUDE_LIBS" ]; then
            while IFS= read -r lib; do
              [ -n "$lib" ] && EXCLUDE_ARGS+=(--exclude "$lib")
            done <<< "$EXCLUDE_LIBS"
          fi

          uv run auditwheel repair wheel/dist/*.whl --plat manylinux_2_35_x86_64 "${EXCLUDE_ARGS[@]}" -w wheel/dist/fixed/
          rm wheel/dist/*.whl && mv wheel/dist/fixed/*.whl wheel/dist/
          uv run python - <<'PY'
          import glob
          import sys
          import zipfile
          
          blocked_prefixes = ("libQt6", "libpyside6.abi3.so", "libshiboken6.abi3.so")
          errors = []
          
          for whl_path in glob.glob("wheel/dist/*.whl"):
              with zipfile.ZipFile(whl_path, "r") as zf:
                  for name in zf.namelist():
                      if ".libs/" not in name:
                          continue
                      lib_name = name.rsplit("/", 1)[-1]
                      if lib_name.startswith(blocked_prefixes):
                          errors.append(f"{whl_path}: {name}")
          
          if errors:
              print("Detected forbidden bundled runtime libraries:")
              for err in errors:
                  print(f"  - {err}")
              sys.exit(1)
          
          print("Wheel runtime check passed: no Qt/PySide/Shiboken vendored libs found.")
          PY
          uv run python -m wheel tags --python-tag cp39 --abi-tag abi3 --remove wheel/dist/*.whl

      - name: Fix Wheel for PyPI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem wheel/dist/*.whl | ForEach-Object {
            uv run python -m wheel tags --python-tag cp39 --abi-tag abi3 --platform-tag win_amd64 --remove $_.FullName
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheel/dist/*.whl

  publish:
    name: Publish to PyPI
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
  
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always dist/*
